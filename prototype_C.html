<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英国日本婦人会 — Hero (B案)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:      #F5F0E8;
    --cream-dark: #EDE5D8;
    --sand:       #D6C9B0;
    --brown:      #8B7A5E;
    --dark:       #2C2318;
    --text:       #3D3020;
    --text-muted: #8B7A5E;
    --accent:     #7A6040;
    --border:     rgba(139,122,94,0.2);
    --font-serif: 'Shippori Mincho', serif;
    --font-display:'Cormorant Garamond', serif;
    --font-sans:  'Josefin Sans', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--cream);
    font-family: var(--font-serif);
    overflow: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 0.2s;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .logo-dummy {
    width: 28px; height: 28px;
    border: 1px dashed rgba(139,122,94,0.55);
    border-radius: 3px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(139,122,94,0.05);
    flex-shrink: 0;
  }
  .logo-dummy svg { display: block; }
  .logo-dummy-label {
    font-family: var(--font-sans);
    font-size: 5.5px; letter-spacing: 0.08em;
    color: rgba(139,122,94,0.6);
    margin-top: 2px;
  }
  .nav-org {
    font-family: var(--font-serif);
    font-size: 13px; font-weight: 500;
    color: var(--dark); letter-spacing: 0.1em;
  }
  .nav-links {
    display: flex; align-items: center; gap: 36px;
  }
  .nav-links a {
    font-family: var(--font-sans);
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.22em; color: var(--text-muted);
    text-decoration: none; text-transform: uppercase;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--dark); }
  .lang-switcher { display: flex; gap: 5px; margin-left: 16px; }
  .lang-btn {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans); font-size: 9px;
    letter-spacing: 0.04em; cursor: pointer;
    border: 0.5px solid var(--border);
    background: transparent; color: var(--text-muted);
    transition: all .2s;
  }
  .lang-btn.active {
    background: var(--dark); color: var(--cream);
    border-color: var(--dark);
  }

  /* ─── HERO WRAPPER ─── */
  .hero {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 340px;
    position: relative;
    overflow: hidden;
  }

  /* ─── LEFT: TEXT AREA ─── */
  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 80px 80px 80px;
    position: relative;
  }

  /* 細い縦アクセントライン */
  .accent-line {
    position: absolute;
    left: 56px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 0;
    background: linear-gradient(to bottom, transparent, var(--sand), transparent);
    animation: growLine 1.2s ease forwards 0.4s;
  }
  @keyframes growLine { to { height: 220px; } }

  .hero-label {
    font-family: var(--font-sans);
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.28em; color: var(--accent);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
    margin-bottom: 5px;
  }
  .hero-est {
    font-family: var(--font-display);
    font-size: 13px; font-weight: 300;
    letter-spacing: 0.18em; color: var(--text-muted);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.8s;
    margin-bottom: 32px;
  }

  /* 大きな日本語タイトル */
  .hero-title {
    font-family: var(--font-serif);
    font-size: 72px; font-weight: 500;
    color: var(--dark);
    line-height: 1.3;
    letter-spacing: 0.06em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1s;
    margin-bottom: 36px;
  }

  /* 横線 */
  .hero-rule {
    width: 0; height: 1px;
    background: var(--sand);
    margin-bottom: 32px;
    animation: growWidth 0.9s ease forwards 1.4s;
  }
  @keyframes growWidth { to { width: 56px; } }

  /* 説明文 */
  .hero-desc {
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.6s;
    margin-bottom: 40px;
  }
  .hero-desc-jp {
    font-family: var(--font-serif);
    font-size: 15px; color: var(--text);
    line-height: 2.2; letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .hero-desc-en {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 13px; color: var(--text-muted);
    line-height: 1.9; letter-spacing: 0.06em;
  }

  /* ロケーション */
  .hero-location {
    display: flex; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 2s;
  }
  .hero-location-line { width: 22px; height: 1px; background: var(--sand); }
  .hero-location-text {
    font-family: var(--font-sans);
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--text-muted);
  }

  /* ─── RIGHT: VISUAL AREA ─── */
  .hero-right {
    position: relative;
    overflow: hidden;
    background: #EDE5D8;
  }

  /* 大きな弧 */
  .arc-large {
    position: absolute;
    bottom: -120px; right: -120px;
    width: 420px; height: 420px;
    border-radius: 50%;
    border: 1px solid rgba(139,122,94,0.3);
    opacity: 0;
    animation: fadeIn 1.5s ease forwards 0.5s;
  }
  .arc-medium {
    position: absolute;
    top: -80px; left: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    border: 0.5px solid rgba(139,122,94,0.15);
    opacity: 0;
    animation: fadeIn 1.5s ease forwards 0.8s;
  }
  .arc-small {
    position: absolute;
    bottom: 80px; left: 20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 0.5px solid rgba(139,122,94,0.2);
    opacity: 0;
    animation: fadeIn 1.5s ease forwards 1.1s;
  }

  /* 縦書き装飾テキスト */
  .vert-deco {
    position: absolute;
    top: 50%; right: 28px;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    font-family: var(--font-serif);
    font-size: 11px;
    color: rgba(139,122,94,0.35);
    letter-spacing: 0.35em;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.8s;
  }

  /* 英語名縦書き */
  .vert-en {
    position: absolute;
    top: 50%; left: 28px;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 10px;
    color: rgba(139,122,94,0.3);
    letter-spacing: 0.2em;
    opacity: 0;
    animation: fadeIn 1s ease forwards 2s;
  }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: absolute;
    bottom: 44px; left: 0; right: 0;
    display: flex;
    justify-content: flex-start;
    padding-left: 80px;
    gap: 36px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 2.2s;
  }
  .bottom-nav a {
    font-family: var(--font-sans);
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.25em; color: var(--text-muted);
    text-decoration: none; text-transform: uppercase;
    transition: color .2s;
  }
  .bottom-nav a:hover { color: var(--dark); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">
    <div class="logo-dummy">
      <svg width="14" height="14" viewBox="0 0 14 14">
        <g transform="translate(7,7)">
          <ellipse cx="0" cy="-3.5" rx="1.6" ry="2.5" fill="rgba(139,122,94,0.55)" transform="rotate(0)"/>
          <ellipse cx="0" cy="-3.5" rx="1.6" ry="2.5" fill="rgba(139,122,94,0.55)" transform="rotate(72)"/>
          <ellipse cx="0" cy="-3.5" rx="1.6" ry="2.5" fill="rgba(139,122,94,0.55)" transform="rotate(144)"/>
          <ellipse cx="0" cy="-3.5" rx="1.6" ry="2.5" fill="rgba(139,122,94,0.55)" transform="rotate(216)"/>
          <ellipse cx="0" cy="-3.5" rx="1.6" ry="2.5" fill="rgba(139,122,94,0.55)" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="1.4" fill="rgba(122,96,64,0.7)"/>
        </g>
      </svg>
      <span class="logo-dummy-label">LOGO</span>
    </div>
    <span class="nav-org">日本英国婦人会</span>
  </a>
  <div style="display:flex;align-items:center;">
    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Contact</a>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active">JP</button>
      <button class="lang-btn">EN</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">

  <!-- LEFT -->
  <div class="hero-left">
    <div class="accent-line"></div>
    <div class="hero-label">Japanese Women's Society · London</div>
    <div class="hero-est">Est. since 1955</div>
    <h1 class="hero-title">英国日本<br>婦人会</h1>
    <div class="hero-rule"></div>
    <div class="hero-desc">
      <p class="hero-desc-jp">
        キャッチコピーが入ります、<br>
        キャッチコピーが入ります。
      </p>
      <p class="hero-desc-en">
        A community bridging cultures,<br>
        nurturing friendship across generations.
      </p>
    </div>
    <div class="hero-location">
      <div class="hero-location-line"></div>
      <span class="hero-location-text">London, United Kingdom</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="hero-right">
    <div class="arc-large"></div>
    <div class="arc-medium"></div>
    <div class="arc-small"></div>
    <div class="vert-deco">英国に生きる、日本の心</div>
    <div class="vert-en">The Japanese Women's Association in Great Britain</div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="#">About</a>
  <a href="#">Blog</a>
  <a href="#">Contact</a>
</div>

</body>
</html>
