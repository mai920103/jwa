<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500&family=Josefin+Sans:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
.hero{width:1200px;height:680px;background:#FFF5F8;display:flex;position:relative;overflow:hidden;}
.left-panel{width:560px;height:100%;display:flex;flex-direction:column;justify-content:center;padding:80px 64px 80px 80px;position:relative;z-index:2;}
.pink-bar{position:absolute;top:0;left:0;width:5px;height:100%;background:linear-gradient(to bottom,#F2A7C3,#D4537E,#A8305A);}
.accent-line{position:absolute;left:66px;top:50%;transform:translateY(-50%);width:1px;height:0;background:linear-gradient(to bottom,transparent,#D4537E,transparent);animation:growLine 1.2s ease forwards 0.3s;}
@keyframes growLine{to{height:200px;}}

/* ダミーロゴエリア */
.logo-placeholder-wrap{margin-left:20px;margin-bottom:28px;opacity:0;animation:fadeUp 0.8s ease forwards 0.6s;}
.logo-placeholder{display:flex;align-items:center;gap:16px;}
.logo-box{width:56px;height:56px;border:1.5px dashed #D4537E;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(212,83,126,0.05);flex-shrink:0;}
.logo-box-inner{width:32px;height:32px;border-radius:50%;border:1px dashed rgba(212,83,126,0.5);display:flex;align-items:center;justify-content:center;}
.logo-box-text{font-family:'Josefin Sans',sans-serif;font-size:7px;letter-spacing:0.05em;color:#D4537E;margin-top:4px;text-align:center;line-height:1.2;}
.logo-name-block{}
.org-name-jp{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:500;color:#2A1018;letter-spacing:0.1em;line-height:1.4;}
.org-name-en{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:300;letter-spacing:0.15em;color:#A8305A;margin-top:3px;line-height:1.5;}

/* 区切り */
.divider{display:flex;align-items:center;gap:10px;margin:24px 20px;}
.div-line{height:1px;background:#E8739E;animation:growW 1s ease forwards 1.2s;width:0;}
@keyframes growW{to{width:40px;}}
.div-bloom{opacity:0;animation:fadeIn 0.6s ease forwards 1.6s;}

/* 説明文 */
.description{margin-left:20px;opacity:0;animation:fadeUp 1s ease forwards 1.4s;}
.desc-jp{font-family:'Shippori Mincho',serif;font-size:14px;color:#4A2030;line-height:2.1;letter-spacing:0.05em;}
.desc-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:#B07090;line-height:1.9;letter-spacing:0.05em;margin-top:10px;}

/* ロケーション */
.founded{margin-left:20px;margin-top:28px;display:flex;align-items:center;gap:10px;opacity:0;animation:fadeUp 0.8s ease forwards 1.9s;}
.f-line{width:18px;height:1px;background:#E8739E;}
.f-text{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:0.22em;color:#B07090;}

/* ナビ */
.nav{position:absolute;bottom:44px;left:80px;display:flex;gap:32px;opacity:0;animation:fadeUp 0.8s ease forwards 2.1s;}
.nav a{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:0.22em;color:#C94F80;text-decoration:none;text-transform:uppercase;}

/* 右パネル */
.right-panel{flex:1;position:relative;overflow:hidden;}
.right-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 55% 45%,#FDDDE8 0%,#FCC8D8 40%,#F5A5C0 100%);}
.arc1{position:absolute;top:-80px;right:-80px;width:480px;height:480px;border-radius:50%;border:80px solid rgba(255,255,255,0.22);}
.arc2{position:absolute;bottom:-100px;left:-60px;width:360px;height:360px;border-radius:50%;border:1px solid rgba(212,83,126,0.2);opacity:0;animation:fadeIn 1.5s ease forwards 0.5s;}
.arc3{position:absolute;top:30px;left:30px;width:200px;height:200px;border-radius:50%;border:0.5px solid rgba(212,83,126,0.15);opacity:0;animation:fadeIn 1.5s ease forwards 0.8s;}
.floral-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);opacity:0;animation:fadeIn 2s ease forwards 0.8s;}
.tag{position:absolute;top:44px;right:36px;background:rgba(255,255,255,0.5);border:1px solid rgba(212,83,126,0.3);padding:6px 14px;font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:0.25em;color:#A03060;text-transform:uppercase;}
.scale{position:absolute;bottom:14px;right:18px;font-family:'Josefin Sans',sans-serif;font-size:9px;color:rgba(160,80,100,0.4);letter-spacing:0.1em;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{to{opacity:1;}}
</style>
</head><body>
