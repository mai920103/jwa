<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400;500&family=Josefin+Sans:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

.phone-wrap{
  display:inline-block;
  background:#2A2020;
  border-radius:44px;
  padding:12px;
  box-shadow:0 0 0 1px #3a2828;
}
.phone-screen{
  width:390px;
  height:844px;
  border-radius:34px;
  overflow:hidden;
  position:relative;
  background:#FFF5F8;
  display:flex;
  flex-direction:column;
}

/* ステータスバー */
.status-bar{
  height:44px;
  padding:14px 28px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.status-time{font-family:'Josefin Sans',sans-serif;font-size:13px;font-weight:400;color:#2A1018;letter-spacing:0.04em;}
.status-icons{display:flex;gap:6px;align-items:center;}
.status-icons svg{display:block;}

/* ナビゲーションバー */
.navbar{
  height:52px;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:0.5px solid rgba(212,83,126,0.15);
  flex-shrink:0;
  opacity:0;
  animation:fadeIn 0.6s ease forwards 0.3s;
}
.navbar-logo-row{display:flex;align-items:center;gap:10px;}
.navbar-logo-dummy{width:28px;height:28px;border:1px dashed rgba(212,83,126,0.6);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.navbar-org{font-family:'Shippori Mincho',serif;font-size:13px;font-weight:500;color:#2A1018;letter-spacing:0.08em;}
.hamburger{display:flex;flex-direction:column;gap:4px;cursor:pointer;}
.hamburger span{display:block;width:20px;height:1px;background:#C94F80;}

/* ヒーロービジュアルエリア（上半分） */
.hero-visual{
  height:360px;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 120% at 60% 60%,#FDDDE8 0%,#FCC8D8 45%,#F09AB8 100%);
}
.arc-top{position:absolute;top:-60px;right:-60px;width:280px;height:280px;border-radius:50%;border:60px solid rgba(255,255,255,0.22);}
.arc-bottom{position:absolute;bottom:-80px;left:-40px;width:220px;height:220px;border-radius:50%;border:0.5px solid rgba(212,83,126,0.2);opacity:0;animation:fadeIn 1.5s ease forwards 0.6s;}
.floral-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  animation:fadeIn 1.5s ease forwards 0.8s;
}
.hero-tagline{
  position:absolute;bottom:24px;left:0;right:0;text-align:center;
  opacity:0;animation:fadeUp 0.8s ease forwards 1.4s;
}
.hero-tagline-text{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:12px;
  color:rgba(80,20,40,0.6);letter-spacing:0.12em;
}

/* テキストエリア（下半分） */
.hero-text{
  flex:1;
  padding:32px 28px 24px;
  display:flex;
  flex-direction:column;
  position:relative;
}
.pink-left-bar{
  position:absolute;left:0;top:32px;
  width:3px;height:0;
  background:linear-gradient(to bottom,#F2A7C3,#D4537E,#A8305A);
  animation:growBar 1s ease forwards 1s;
}
@keyframes growBar{to{height:120px;}}

.org-name-block{margin-left:16px;opacity:0;animation:fadeUp 0.8s ease forwards 1s;}
.org-jp{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:500;color:#2A1018;letter-spacing:0.08em;line-height:1.4;}
.org-en{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:300;letter-spacing:0.12em;color:#A8305A;margin-top:4px;line-height:1.6;}

.divider-row{display:flex;align-items:center;gap:8px;margin:20px 16px 0;}
.div-line{height:1px;background:#E8739E;animation:growW 0.8s ease forwards 1.4s;width:0;}
@keyframes growW{to{width:32px;}}
.div-bloom{opacity:0;animation:fadeIn 0.6s ease forwards 1.8s;}

.desc-block{margin:16px 16px 0;opacity:0;animation:fadeUp 0.8s ease forwards 1.6s;}
.desc-jp{font-family:'Shippori Mincho',serif;font-size:13px;color:#4A2030;line-height:2;letter-spacing:0.05em;}
.desc-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:#B07090;line-height:1.8;margin-top:8px;letter-spacing:0.04em;}

.location-row{margin:18px 16px 0;display:flex;align-items:center;gap:8px;opacity:0;animation:fadeUp 0.6s ease forwards 2s;}
.loc-line{width:14px;height:1px;background:#E8739E;}
.loc-text{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:0.22em;color:#B07090;}

/* ホームインジケーター */
.home-indicator{
  height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.home-bar{width:134px;height:5px;background:rgba(42,16,24,0.2);border-radius:3px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{to{opacity:1;}}
</style>
